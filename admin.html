<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邀请码管理</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --ink: #132033;
      --muted: #64748b;
      --line: #dbe3ef;
      --brand: #147f73;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(760px, calc(100% - 32px));
      margin: 32px auto;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .08);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 180px 140px;
      gap: 12px;
      align-items: end;
      margin-top: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }
    textarea {
      min-height: 190px;
      resize: vertical;
      line-height: 1.7;
      font-family: Consolas, ui-monospace, monospace;
    }
    button {
      border: 1px solid var(--brand);
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      background: var(--brand);
      cursor: pointer;
    }
    button.secondary {
      color: var(--brand);
      background: #fff;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .status {
      min-height: 24px;
      color: var(--muted);
      margin-top: 12px;
    }
    .status.error { color: var(--danger); }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>邀请码管理</h1>
      <p>输入管理员口令，选择试用类型和数量，即可自动生成随机邀请码。生成后复制发给家长，每个邀请码只能注册一次。</p>

      <div class="grid">
        <label>
          管理员口令
          <input id="adminSecret" type="password" placeholder="Render 里配置的 ADMIN_SECRET" />
        </label>
        <label>
          试用类型
          <select id="inviteType">
            <option value="one_day">1 天试用</option>
            <option value="one_month">1 个月试用</option>
          </select>
        </label>
        <label>
          数量
          <input id="count" type="number" min="1" max="100" value="10" />
        </label>
      </div>

      <div class="actions">
        <button id="generate">生成邀请码</button>
        <button class="secondary" id="copy">复制结果</button>
      </div>
      <div class="status" id="status"></div>
      <div class="stats" id="stats"></div>
    </section>

    <section class="panel">
      <label>
        本次生成的邀请码
        <textarea id="codes" readonly placeholder="生成后会出现在这里"></textarea>
      </label>
    </section>
  </main>

  <script>
    const status = document.querySelector("#status");
    const stats = document.querySelector("#stats");
    const codes = document.querySelector("#codes");

    function setStatus(text, isError = false) {
      status.textContent = text;
      status.classList.toggle("error", isError);
    }

    function renderStats(data) {
      if (!data) {
        stats.innerHTML = "";
        return;
      }
      stats.innerHTML = `
        <span class="pill">总计 ${data.total} 个</span>
        <span class="pill">未使用 ${data.unused} 个</span>
        <span class="pill">1 天未使用 ${data.oneDayUnused} 个</span>
        <span class="pill">1 个月未使用 ${data.oneMonthUnused} 个</span>
      `;
    }

    document.querySelector("#generate").addEventListener("click", async () => {
      setStatus("正在生成...");
      codes.value = "";
      renderStats(null);
      try {
        const res = await fetch("/api/admin/invite-codes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            adminSecret: document.querySelector("#adminSecret").value,
            type: document.querySelector("#inviteType").value,
            count: document.querySelector("#count").value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || "生成失败", true);
          return;
        }
        codes.value = data.codes.join("\n");
        renderStats(data.stats);
        setStatus("已生成，可以复制发给家长。");
      } catch {
        setStatus("网络暂时不可用，请稍后再试。", true);
      }
    });

    document.querySelector("#copy").addEventListener("click", async () => {
      if (!codes.value.trim()) {
        setStatus("还没有可复制的邀请码。", true);
        return;
      }
      await navigator.clipboard.writeText(codes.value);
      setStatus("已复制。");
    });
  </script>
</body>
</html>
