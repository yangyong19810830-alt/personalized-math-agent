<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个性化数学学习智能体</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --paper: #ffffff;
      --bg: #f5f7fb;
      --teal: #0f766e;
      --soft: #eef8f6;
      --danger: #b42318;
      --shadow: 0 14px 32px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .logo {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }
    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }
    .quota {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 360px;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .head {
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 15px;
    }
    .body { padding: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 13px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }
    .field { margin-bottom: 13px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 7px;
      padding: 9px 11px;
      color: #344054;
      cursor: pointer;
    }
    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: white;
      font-weight: 800;
    }
    .btn.full { width: 100%; }
    .seg {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      margin-bottom: 14px;
    }
    .seg button.active {
      border-color: #7dd3c7;
      background: #e8f7f4;
      color: var(--teal);
      font-weight: 800;
    }
    .steps {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }
    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
    }
    .step strong {
      display: block;
      margin-bottom: 3px;
    }
    .chat {
      min-height: 640px;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    .messages {
      padding: 15px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .msg {
      max-width: 86%;
      border-radius: 8px;
      padding: 11px 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .msg.agent {
      border: 1px solid #b9e3dc;
      background: var(--soft);
    }
    .msg.user {
      justify-self: end;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }
    .msg.error {
      border-color: #fda29b;
      background: #fff3f0;
      color: var(--danger);
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: end;
    }
    .voice-btn.listening {
      border-color: #f97316;
      color: #9a3412;
      background: #fff7ed;
    }
    .msg-speak {
      display: block;
      width: max-content;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
    }
    .file-btn {
      position: relative;
      overflow: hidden;
      display: inline-grid;
      place-items: center;
      min-height: 44px;
    }
    .file-btn input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .preview {
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      display: none;
      gap: 10px;
      align-items: center;
      background: #fff;
    }
    .preview.show { display: flex; }
    .preview img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .visual {
      min-height: 640px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .visual-board {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .visual-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .visual-title {
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .visual-card svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .legend {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .auth {
      max-width: 520px;
      margin: 20px auto 0;
    }
    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .userbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; padding: 10px; }
      .composer { grid-template-columns: 1fr; }
      .msg { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">Math</div>
        <div>
          <h1>个性化数学学习智能体</h1>
          <div class="sub">小学到大学数学 · 先定位卡点，再安排路径，最后形成稳定理解</div>
        </div>
      </div>
      <div class="userbar">
        <div class="quota" id="quota">剩余次数：读取中</div>
        <button class="btn hidden" id="logout">退出</button>
      </div>
    </header>

    <section class="panel auth" id="authPanel">
      <div class="head"><h2>凭邀请码开始试用</h2></div>
      <div class="body">
        <div class="field">
          <label for="authName">昵称</label>
          <input id="authName" placeholder="例如：小明妈妈" />
        </div>
        <div class="field">
          <label for="authEmail">邮箱</label>
          <input id="authEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="authPassword">密码</label>
          <input id="authPassword" type="password" placeholder="至少 6 位" />
        </div>
        <div class="field">
          <label for="inviteCode">邀请码</label>
          <input id="inviteCode" placeholder="注册时填写，登录不需要" />
        </div>
        <div class="auth-actions">
          <button class="btn primary" id="register">注册并登录</button>
          <button class="btn" id="login">登录</button>
        </div>
        <p class="small">新用户需要邀请码才能注册试用。账号用于记录每日试用次数，请不要使用常用重要密码。</p>
      </div>
    </section>

    <main id="mainApp" class="hidden">
      <aside class="panel">
        <div class="head"><h2>学习画像</h2></div>
        <div class="body">
          <div class="seg" id="stageButtons">
            <button class="btn active" data-stage="小学">小学</button>
            <button class="btn" data-stage="初中">初中</button>
            <button class="btn" data-stage="高中">高中</button>
            <button class="btn" data-stage="大学">大学</button>
          </div>

          <div class="field">
            <label for="goal">学习目标</label>
            <select id="goal">
              <option>补齐薄弱知识</option>
              <option>校内同步提分</option>
              <option>中考/高考冲刺</option>
              <option>数学竞赛启蒙</option>
              <option>大学课程过关</option>
              <option>建立长期数学思维</option>
            </select>
          </div>

          <div class="field">
            <label for="state">当前状态</label>
            <select id="state">
              <option>起步混乱：会听但串不起来</option>
              <option>局部会做但不稳定</option>
              <option>能迁移、能表达</option>
              <option>靠套路维持</option>
              <option>准备换一种理解</option>
            </select>
          </div>

          <button class="btn primary full" id="plan">安排今天的学习</button>

          <div class="steps">
            <div class="step"><strong>1. 定位卡点</strong>先判断是概念、方法、条件关系还是表达卡住。</div>
            <div class="step"><strong>2. 给一层提示</strong>不直接替学生做完，先推动第一步。</div>
            <div class="step"><strong>3. 变式巩固</strong>用少量同类题确认理解是否稳定。</div>
            <div class="step"><strong>4. 家长可观察</strong>看孩子能否说清“为什么这样做”。</div>
          </div>
        </div>
      </aside>

      <section class="panel chat">
        <div class="messages" id="messages"></div>
        <div class="preview" id="imagePreview">
          <img id="previewImage" alt="题目图片预览" />
          <div>
            <div class="small" id="previewText">已选择题目图片</div>
            <button class="btn" id="recognizeImage">重新识别并提问</button>
            <button class="btn" id="clearImage">清除</button>
          </div>
        </div>
        <div class="composer">
          <label class="btn file-btn">上传题图
            <input id="imageInput" type="file" accept="image/*" />
          </label>
          <textarea id="question" placeholder="输入题目，或直接 Ctrl+V 粘贴题目截图。"></textarea>
          <button class="btn voice-btn" id="voiceInput">语音输入</button>
          <button class="btn primary" id="send">发送</button>
        </div>
      </section>

      <aside class="panel visual">
        <div class="head"><h2>解题结构图</h2></div>
        <div class="visual-board" id="visualBoard"></div>
        <div class="body small">输入具体题目后，这里会画出“已知条件、关键关系、解题步骤、目标结果”的推进图。</div>
      </aside>
    </main>
  </div>

  <script>
    let stage = "小学";
    let history = [];
    let authToken = localStorage.getItem("math_agent_token") || "";
    let currentUser = null;
    let selectedImageData = "";
    const messages = document.querySelector("#messages");
    const quota = document.querySelector("#quota");
    const authPanel = document.querySelector("#authPanel");
    const mainApp = document.querySelector("#mainApp");
    const visualBoard = document.querySelector("#visualBoard");
    const imagePreview = document.querySelector("#imagePreview");
    const previewImage = document.querySelector("#previewImage");
    const voiceButton = document.querySelector("#voiceInput");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    function profile() {
      return {
        stage,
        goal: document.querySelector("#goal").value,
        state: document.querySelector("#state").value
      };
    }

    function addMessage(text, role = "agent") {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const normalized = normalizeMathText(text);
      div.textContent = normalized;
      if (role === "agent" && normalized && !normalized.startsWith("正在")) {
        const speakButton = document.createElement("button");
        speakButton.className = "msg-speak";
        speakButton.type = "button";
        speakButton.textContent = "朗读";
        speakButton.addEventListener("click", () => speakText(normalized));
        div.appendChild(speakButton);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      if (window.MathJax?.typesetPromise) {
        window.MathJax.typesetPromise([div]).catch(() => {});
      }
      return div;
    }

    function normalizeMathText(text) {
      return String(text || "")
        .replace(/\\dfrac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)")
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)")
        .replace(/\\leqslant|\\leq/g, "≤")
        .replace(/\\geqslant|\\geq/g, "≥")
        .replace(/\\neq/g, "≠")
        .replace(/\\times/g, "×")
        .replace(/\\div/g, "÷")
        .replace(/\\begin\{cases\}/g, "")
        .replace(/\\end\{cases\}/g, "")
        .replace(/\\\\/g, "\n")
        .replace(/\\text\{([^{}]+)\}/g, "$1")
        .replace(/\$/g, "")
        .trim();
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) {
        addMessage("当前浏览器不支持朗读功能，可以换 Chrome 或 Edge 再试。", "error");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(normalizeMathText(text));
      utterance.lang = "zh-CN";
      utterance.rate = 0.92;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function setListening(active) {
      listening = active;
      voiceButton.classList.toggle("listening", active);
      voiceButton.textContent = active ? "停止语音" : "语音输入";
    }

    function appendQuestionText(text) {
      const box = document.querySelector("#question");
      const current = box.value.trim();
      box.value = current ? `${current}\n${text}` : text;
      box.focus();
    }

    function startVoiceInput() {
      if (!SpeechRecognition) {
        addMessage("当前浏览器不支持语音输入。建议用 Chrome 或 Edge 打开网站再试。", "error");
        return;
      }
      if (listening && recognition) {
        recognition.stop();
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "zh-CN";
      recognition.interimResults = true;
      recognition.continuous = false;

      let finalText = "";
      recognition.onstart = () => setListening(true);
      recognition.onresult = event => {
        let interimText = "";
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const transcript = event.results[index][0].transcript.trim();
          if (event.results[index].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }
        const preview = finalText || interimText;
        if (preview) {
          document.querySelector("#question").placeholder = `正在听：${preview}`;
        }
      };
      recognition.onerror = () => {
        setListening(false);
        document.querySelector("#question").placeholder = "输入题目，或直接 Ctrl+V 粘贴题目截图。";
        addMessage("这次没有听清楚，可以靠近一点再试。", "error");
      };
      recognition.onend = () => {
        setListening(false);
        document.querySelector("#question").placeholder = "输入题目，或直接 Ctrl+V 粘贴题目截图。";
        const text = finalText.trim();
        if (text) appendQuestionText(text);
      };
      recognition.start();
    }

    function visualCard(title, svg, legend) {
      visualBoard.innerHTML = `
        <div class="visual-card">
          <div class="visual-title">${title}</div>
          ${svg}
          <div class="legend">${legend}</div>
        </div>
      `;
    }

    function drawDefault() {
      visualCard(
        "解题结构图",
        `<svg viewBox="0 0 320 180" role="img" aria-label="学习结构图">
          <rect x="24" y="62" width="74" height="44" rx="8" fill="#fff" stroke="#98a2b3"/>
          <rect x="123" y="62" width="74" height="44" rx="8" fill="#eef8f6" stroke="#0f766e"/>
          <rect x="222" y="62" width="74" height="44" rx="8" fill="#fff" stroke="#98a2b3"/>
          <text x="43" y="89" font-size="13" fill="#344054">卡点</text>
          <text x="142" y="89" font-size="13" fill="#0f766e">提示</text>
          <text x="235" y="89" font-size="13" fill="#344054">方法</text>
          <line x1="98" y1="84" x2="123" y2="84" stroke="#667085"/>
          <polygon points="123,84 115,79 115,89" fill="#667085"/>
          <line x1="197" y1="84" x2="222" y2="84" stroke="#667085"/>
          <polygon points="222,84 214,79 214,89" fill="#667085"/>
          <text x="50" y="140" font-size="13" fill="#667085">先看卡在哪里，再推进一小步</text>
        </svg>`,
        "我会先提问启发。等你说出想法后，再根据需要画出结构图。"
      );
    }

    function drawThinking() {
      visualCard(
        "先思考，再画图",
        `<svg viewBox="0 0 320 170" role="img" aria-label="先思考">
          <rect x="42" y="42" width="236" height="48" rx="8" fill="#fff7ed" stroke="#f97316"/>
          <text x="160" y="72" text-anchor="middle" font-size="14" fill="#9a3412">先说出你的想法</text>
          <path d="M88 118 C120 96, 190 96, 224 118" fill="none" stroke="#98a2b3" stroke-width="2" stroke-dasharray="5 4"/>
          <text x="160" y="142" text-anchor="middle" font-size="12" fill="#667085">回答后，我再判断是否画结构图</text>
        </svg>`,
        "请先尝试说：已知什么？要求什么？第一步想怎么做？"
      );
    }

    function nodeStyle(type) {
      const styles = {
        given: ["#eff6ff", "#1d4ed8"],
        goal: ["#fff7ed", "#c2410c"],
        relation: ["#f5f3ff", "#6d28d9"],
        step: ["#eef8f6", "#0f766e"],
        result: ["#ecfdf3", "#15803d"],
        check: ["#f8fafc", "#475467"]
      };
      return styles[type] || styles.step;
    }

    function renderStructureDiagram(diagram) {
      if (!diagram || !Array.isArray(diagram.nodes) || !diagram.nodes.length) {
        drawDefault();
        return;
      }

      const nodes = diagram.nodes.slice(0, 9);
      const edges = Array.isArray(diagram.edges) ? diagram.edges.slice(0, 10) : [];
      const cols = nodes.length <= 4 ? 1 : 2;
      const nodeW = cols === 1 ? 220 : 132;
      const nodeH = 50;
      const gapX = 28;
      const gapY = 30;
      const startX = cols === 1 ? 50 : 26;
      const startY = 28;
      const positions = {};

      nodes.forEach((node, index) => {
        const col = cols === 1 ? 0 : index % 2;
        const row = cols === 1 ? index : Math.floor(index / 2);
        positions[node.id] = {
          x: startX + col * (nodeW + gapX),
          y: startY + row * (nodeH + gapY)
        };
      });

      const rows = cols === 1 ? nodes.length : Math.ceil(nodes.length / 2);
      const height = Math.max(190, startY * 2 + rows * nodeH + (rows - 1) * gapY);

      const edgeSvg = edges.map(edge => {
        const from = positions[edge.from];
        const to = positions[edge.to];
        if (!from || !to) return "";
        const x1 = from.x + nodeW / 2;
        const y1 = from.y + nodeH;
        const x2 = to.x + nodeW / 2;
        const y2 = to.y;
        const midY = (y1 + y2) / 2;
        return `
          <path d="M${x1} ${y1} C${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}" fill="none" stroke="#98a2b3" stroke-width="1.7" marker-end="url(#arrow)"/>
          ${edge.label ? `<text x="${(x1 + x2) / 2}" y="${midY - 4}" text-anchor="middle" font-size="10" fill="#667085">${escapeHtml(edge.label)}</text>` : ""}
        `;
      }).join("");

      const nodeSvg = nodes.map(node => {
        const pos = positions[node.id];
        const [fill, stroke] = nodeStyle(node.type);
        return `
          <rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="1.6"/>
          <text x="${pos.x + nodeW / 2}" y="${pos.y + 30}" text-anchor="middle" font-size="12" fill="#1f2937">${escapeHtml(node.label)}</text>
        `;
      }).join("");

      visualCard(
        escapeHtml(diagram.title || "解题结构图"),
        `<svg viewBox="0 0 320 ${height}" role="img" aria-label="解题结构图">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
              <path d="M0,0 L8,4 L0,8 z" fill="#98a2b3"></path>
            </marker>
          </defs>
          ${edgeSvg}
          ${nodeSvg}
        </svg>`,
        "这张图展示的是本题从已知条件到目标结果的推进关系。"
      );
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function setQuota(data) {
      if (!data || typeof data.remaining === "undefined") return;
      const trial = data.user?.trial;
      if (trial && !trial.active) {
        quota.textContent = "试用已结束";
        return;
      }
      const trialText = trial?.remainingDays ? `｜试用剩余 ${trial.remainingDays} 天` : "";
      quota.textContent = `今日剩余：${data.remaining}/${data.limit} 次${trialText}`;
    }

    function authHeaders() {
      return authToken ? { Authorization: `Bearer ${authToken}` } : {};
    }

    function updateAuthView(data) {
      currentUser = data?.user || null;
      setQuota(data);
      document.querySelector("#logout").classList.toggle("hidden", !currentUser);
      authPanel.classList.toggle("hidden", Boolean(currentUser));
      mainApp.classList.toggle("hidden", !currentUser);
      if (currentUser && !messages.children.length) {
        if (currentUser.trial && !currentUser.trial.active) {
          addMessage(`你好，${currentUser.name}。这个账号的试用期已经结束，请联系老师或管理员获取新的试用资格。`, "error");
        } else {
          const trialDays = currentUser.trial?.remainingDays ? `当前试用剩余 ${currentUser.trial.remainingDays} 天。` : "";
          addMessage(`你好，${currentUser.name}。${trialDays}你可以发一道题，也可以让我安排今天的学习。我会先定位卡点，再给合适提示，帮助学生形成稳定方法。`);
        }
      }
    }

    async function loadQuota() {
      try {
        const res = await fetch("/api/me", { headers: authHeaders() });
        updateAuthView(await res.json());
      } catch {
        quota.textContent = "剩余次数：无法读取";
      }
    }

    async function authRequest(path) {
      const payload = {
        name: document.querySelector("#authName").value.trim(),
        email: document.querySelector("#authEmail").value.trim(),
        password: document.querySelector("#authPassword").value,
        inviteCode: document.querySelector("#inviteCode").value.trim()
      };
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error || "操作失败");
        return;
      }
      authToken = data.token;
      localStorage.setItem("math_agent_token", authToken);
      updateAuthView(data);
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = String(reader.result || "");
          compressImageDataUrl(dataUrl).then(resolve).catch(() => resolve(dataUrl));
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function compressImageDataUrl(dataUrl) {
      return new Promise(resolve => {
        const image = new Image();
        image.onload = () => {
          const maxSide = 1600;
          const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
          const width = Math.max(1, Math.round(image.width * scale));
          const height = Math.max(1, Math.round(image.height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d");
          context.fillStyle = "#fff";
          context.fillRect(0, 0, width, height);
          context.drawImage(image, 0, 0, width, height);
          const compressed = canvas.toDataURL("image/jpeg", 0.82);
          resolve(compressed.length < dataUrl.length ? compressed : dataUrl);
        };
        image.onerror = () => resolve(dataUrl);
        image.src = dataUrl;
      });
    }

    async function recognizeSelectedImage() {
      if (!selectedImageData) {
        addMessage("请先上传一张题目图片。", "error");
        return false;
      }
      const loading = addMessage("正在识别题目图片...");
      try {
        const res = await fetch("/api/vision", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({ image: selectedImageData })
        });
        const data = await res.json();
        loading.remove();
        if (!res.ok) {
          addMessage(data.error || "图片识别失败。", "error");
          return false;
        }
        const recognizedText = String(data.text || "").trim();
        if (!recognizedText) {
          addMessage("图片识别完成了，但没有读到清晰的题目内容。可以换一张更清楚的图片，或手动输入题目。", "error");
          return false;
        }
        document.querySelector("#question").value = "";
        await send(recognizedText, { displayText: "我上传了一张题目图片" });
        return true;
      } catch {
        loading.remove();
        addMessage("图片识别服务暂时不可用。你可以先手动输入题目文字。", "error");
        return false;
      }
    }

    async function acceptImageFile(file, source = "上传") {
      if (!file || !file.type.startsWith("image/")) {
        addMessage("请提供图片格式的题目截图。", "error");
        return false;
      }
      if (file.size > 4 * 1024 * 1024) {
        addMessage("图片太大了，请上传或粘贴 4MB 以内的题目图片。", "error");
        return false;
      }
      selectedImageData = await fileToDataUrl(file);
      previewImage.src = selectedImageData;
      imagePreview.classList.add("show");
      document.querySelector("#previewText").textContent = `已${source}题目图片，正在自动识别并开始提问。`;
      return true;
    }

    async function send(text, options = {}) {
      addMessage(options.displayText || text, "user");
      drawThinking();
      history.push({ role: "user", content: text });
      const loading = addMessage("正在生成个性化讲解...");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({
            profile: profile(),
            messages: history
          })
        });
        const data = await res.json();
        loading.remove();
        setQuota(data);

        if (!res.ok) {
          addMessage(data.error || "本次请求失败。", "error");
          return;
        }

        addMessage(data.answer);
        if (data.diagramAction === "show" || data.diagramAction === "update") {
          renderStructureDiagram(data.diagram);
        } else {
          drawThinking();
        }
        history.push({ role: "assistant", content: data.answer });
      } catch (error) {
        loading.remove();
        addMessage("网络或服务暂时不可用，请稍后再试。", "error");
      }
    }

    document.querySelectorAll("#stageButtons button").forEach(button => {
      button.addEventListener("click", () => {
        stage = button.dataset.stage;
        document.querySelectorAll("#stageButtons button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    document.querySelector("#send").addEventListener("click", () => {
      const box = document.querySelector("#question");
      const text = box.value.trim();
      if (!text) return;
      box.value = "";
      send(text);
    });

    voiceButton.addEventListener("click", startVoiceInput);

    document.querySelector("#plan").addEventListener("click", () => {
      send("请根据我的阶段、目标和当前状态，安排今天的数学学习。");
    });

    document.querySelector("#imageInput").addEventListener("change", async event => {
      const file = event.target.files?.[0];
      if (file && await acceptImageFile(file, "上传")) {
        await recognizeSelectedImage();
      }
    });

    document.querySelector("#question").addEventListener("paste", async event => {
      const items = Array.from(event.clipboardData?.items || []);
      const imageItem = items.find(item => item.type.startsWith("image/"));
      if (!imageItem) return;
      event.preventDefault();
      const file = imageItem.getAsFile();
      if (await acceptImageFile(file, "粘贴")) {
        await recognizeSelectedImage();
      }
    });

    document.querySelector("#recognizeImage").addEventListener("click", recognizeSelectedImage);
    document.querySelector("#clearImage").addEventListener("click", () => {
      selectedImageData = "";
      previewImage.removeAttribute("src");
      imagePreview.classList.remove("show");
      document.querySelector("#imageInput").value = "";
    });

    document.querySelector("#register").addEventListener("click", () => authRequest("/api/register"));
    document.querySelector("#login").addEventListener("click", () => authRequest("/api/login"));
    document.querySelector("#logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST", headers: authHeaders() }).catch(() => {});
      authToken = "";
      currentUser = null;
      localStorage.removeItem("math_agent_token");
      messages.innerHTML = "";
      updateAuthView({ user: null, limit: 0, remaining: 0 });
      quota.textContent = "请先登录";
    });

    loadQuota();
    drawDefault();
  </script>
</body>
</html>
