<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个性化数学学习智能体</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --paper: #ffffff;
      --bg: #f5f7fb;
      --teal: #0f766e;
      --soft: #eef8f6;
      --danger: #b42318;
      --shadow: 0 14px 32px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .logo {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }
    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }
    .quota {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr);
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .head {
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 15px;
    }
    .body { padding: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 13px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }
    .field { margin-bottom: 13px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 7px;
      padding: 9px 11px;
      color: #344054;
      cursor: pointer;
    }
    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: white;
      font-weight: 800;
    }
    .btn.full { width: 100%; }
    .seg {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      margin-bottom: 14px;
    }
    .seg button.active {
      border-color: #7dd3c7;
      background: #e8f7f4;
      color: var(--teal);
      font-weight: 800;
    }
    .steps {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }
    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
    }
    .step strong {
      display: block;
      margin-bottom: 3px;
    }
    .chat {
      min-height: 640px;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    .messages {
      padding: 15px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .msg {
      max-width: 86%;
      border-radius: 8px;
      padding: 11px 12px;
      line-height: 1.6;
      white-space: pre-line;
      font-size: 14px;
    }
    .msg.agent {
      border: 1px solid #b9e3dc;
      background: var(--soft);
    }
    .msg.user {
      justify-self: end;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }
    .msg.error {
      border-color: #fda29b;
      background: #fff3f0;
      color: var(--danger);
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; padding: 10px; }
      .composer { grid-template-columns: 1fr; }
      .msg { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">Math</div>
        <div>
          <h1>个性化数学学习智能体</h1>
          <div class="sub">小学到大学数学 · 先定位卡点，再安排路径，最后形成稳定理解</div>
        </div>
      </div>
      <div class="quota" id="quota">剩余次数：读取中</div>
    </header>

    <main>
      <aside class="panel">
        <div class="head"><h2>学习画像</h2></div>
        <div class="body">
          <div class="seg" id="stageButtons">
            <button class="btn active" data-stage="小学">小学</button>
            <button class="btn" data-stage="初中">初中</button>
            <button class="btn" data-stage="高中">高中</button>
            <button class="btn" data-stage="大学">大学</button>
          </div>

          <div class="field">
            <label for="goal">学习目标</label>
            <select id="goal">
              <option>补齐薄弱知识</option>
              <option>校内同步提分</option>
              <option>中考/高考冲刺</option>
              <option>数学竞赛启蒙</option>
              <option>大学课程过关</option>
              <option>建立长期数学思维</option>
            </select>
          </div>

          <div class="field">
            <label for="state">当前状态</label>
            <select id="state">
              <option>起步混乱：会听但串不起来</option>
              <option>局部会做但不稳定</option>
              <option>能迁移、能表达</option>
              <option>靠套路维持</option>
              <option>准备换一种理解</option>
            </select>
          </div>

          <button class="btn primary full" id="plan">安排今天的学习</button>

          <div class="steps">
            <div class="step"><strong>1. 定位卡点</strong>先判断是概念、方法、条件关系还是表达卡住。</div>
            <div class="step"><strong>2. 给一层提示</strong>不直接替学生做完，先推动第一步。</div>
            <div class="step"><strong>3. 变式巩固</strong>用少量同类题确认理解是否稳定。</div>
            <div class="step"><strong>4. 家长可观察</strong>看孩子能否说清“为什么这样做”。</div>
          </div>
        </div>
      </aside>

      <section class="panel chat">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="question" placeholder="输入一道题、一个不会的知识点，或让智能体安排今天的学习。"></textarea>
          <button class="btn primary" id="send">发送</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const guestKey = "math_agent_guest_id";
    const guestId = localStorage.getItem(guestKey) || crypto.randomUUID();
    localStorage.setItem(guestKey, guestId);

    let stage = "小学";
    let history = [];
    const messages = document.querySelector("#messages");
    const quota = document.querySelector("#quota");

    function profile() {
      return {
        stage,
        goal: document.querySelector("#goal").value,
        state: document.querySelector("#state").value
      };
    }

    function addMessage(text, role = "agent") {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function setQuota(data) {
      if (!data || typeof data.remaining === "undefined") return;
      quota.textContent = `今日剩余：${data.remaining}/${data.limit} 次`;
    }

    async function loadQuota() {
      try {
        const res = await fetch(`/api/quota?guestId=${encodeURIComponent(guestId)}`);
        setQuota(await res.json());
      } catch {
        quota.textContent = "剩余次数：无法读取";
      }
    }

    async function send(text) {
      addMessage(text, "user");
      history.push({ role: "user", content: text });
      const loading = addMessage("正在生成个性化讲解...");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            guestId,
            profile: profile(),
            messages: history
          })
        });
        const data = await res.json();
        loading.remove();
        setQuota(data);

        if (!res.ok) {
          addMessage(data.error || "本次请求失败。", "error");
          return;
        }

        addMessage(data.answer);
        history.push({ role: "assistant", content: data.answer });
      } catch (error) {
        loading.remove();
        addMessage("网络或服务暂时不可用，请稍后再试。", "error");
      }
    }

    document.querySelectorAll("#stageButtons button").forEach(button => {
      button.addEventListener("click", () => {
        stage = button.dataset.stage;
        document.querySelectorAll("#stageButtons button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    document.querySelector("#send").addEventListener("click", () => {
      const box = document.querySelector("#question");
      const text = box.value.trim();
      if (!text) return;
      box.value = "";
      send(text);
    });

    document.querySelector("#plan").addEventListener("click", () => {
      send("请根据我的阶段、目标和当前状态，安排今天的数学学习。");
    });

    addMessage("你好，我是个性化数学学习智能体。你可以发一道题，也可以让我安排今天的学习。我会先定位卡点，再给合适提示，帮助你形成稳定方法。");
    loadQuota();
  </script>
</body>
</html>
