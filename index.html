<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个性化数学学习智能体</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --paper: #ffffff;
      --bg: #f5f7fb;
      --teal: #0f766e;
      --soft: #eef8f6;
      --danger: #b42318;
      --shadow: 0 14px 32px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .logo {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }
    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }
    .quota {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 360px;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .head {
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 15px;
    }
    .body { padding: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 13px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }
    .field { margin-bottom: 13px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 7px;
      padding: 9px 11px;
      color: #344054;
      cursor: pointer;
    }
    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: white;
      font-weight: 800;
    }
    .btn.full { width: 100%; }
    .seg {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      margin-bottom: 14px;
    }
    .seg button.active {
      border-color: #7dd3c7;
      background: #e8f7f4;
      color: var(--teal);
      font-weight: 800;
    }
    .steps {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }
    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
    }
    .step strong {
      display: block;
      margin-bottom: 3px;
    }
    .chat {
      min-height: 640px;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    .messages {
      padding: 15px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .msg {
      max-width: 86%;
      border-radius: 8px;
      padding: 11px 12px;
      line-height: 1.6;
      white-space: pre-line;
      font-size: 14px;
    }
    .msg.agent {
      border: 1px solid #b9e3dc;
      background: var(--soft);
    }
    .msg.user {
      justify-self: end;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }
    .msg.error {
      border-color: #fda29b;
      background: #fff3f0;
      color: var(--danger);
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
    }
    .visual {
      min-height: 640px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .visual-board {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .visual-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .visual-title {
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .visual-card svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .legend {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .auth {
      max-width: 520px;
      margin: 20px auto 0;
    }
    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .userbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; padding: 10px; }
      .composer { grid-template-columns: 1fr; }
      .msg { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">Math</div>
        <div>
          <h1>个性化数学学习智能体</h1>
          <div class="sub">小学到大学数学 · 先定位卡点，再安排路径，最后形成稳定理解</div>
        </div>
      </div>
      <div class="userbar">
        <div class="quota" id="quota">剩余次数：读取中</div>
        <button class="btn hidden" id="logout">退出</button>
      </div>
    </header>

    <section class="panel auth" id="authPanel">
      <div class="head"><h2>登录后开始试用</h2></div>
      <div class="body">
        <div class="field">
          <label for="authName">昵称</label>
          <input id="authName" placeholder="例如：小明妈妈" />
        </div>
        <div class="field">
          <label for="authEmail">邮箱</label>
          <input id="authEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="authPassword">密码</label>
          <input id="authPassword" type="password" placeholder="至少 6 位" />
        </div>
        <div class="auth-actions">
          <button class="btn primary" id="register">注册并登录</button>
          <button class="btn" id="login">登录</button>
        </div>
        <p class="small">账号用于记录每日试用次数。请不要使用常用重要密码。</p>
      </div>
    </section>

    <main id="mainApp" class="hidden">
      <aside class="panel">
        <div class="head"><h2>学习画像</h2></div>
        <div class="body">
          <div class="seg" id="stageButtons">
            <button class="btn active" data-stage="小学">小学</button>
            <button class="btn" data-stage="初中">初中</button>
            <button class="btn" data-stage="高中">高中</button>
            <button class="btn" data-stage="大学">大学</button>
          </div>

          <div class="field">
            <label for="goal">学习目标</label>
            <select id="goal">
              <option>补齐薄弱知识</option>
              <option>校内同步提分</option>
              <option>中考/高考冲刺</option>
              <option>数学竞赛启蒙</option>
              <option>大学课程过关</option>
              <option>建立长期数学思维</option>
            </select>
          </div>

          <div class="field">
            <label for="state">当前状态</label>
            <select id="state">
              <option>起步混乱：会听但串不起来</option>
              <option>局部会做但不稳定</option>
              <option>能迁移、能表达</option>
              <option>靠套路维持</option>
              <option>准备换一种理解</option>
            </select>
          </div>

          <button class="btn primary full" id="plan">安排今天的学习</button>

          <div class="steps">
            <div class="step"><strong>1. 定位卡点</strong>先判断是概念、方法、条件关系还是表达卡住。</div>
            <div class="step"><strong>2. 给一层提示</strong>不直接替学生做完，先推动第一步。</div>
            <div class="step"><strong>3. 变式巩固</strong>用少量同类题确认理解是否稳定。</div>
            <div class="step"><strong>4. 家长可观察</strong>看孩子能否说清“为什么这样做”。</div>
          </div>
        </div>
      </aside>

      <section class="panel chat">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="question" placeholder="输入一道题、一个不会的知识点，或让智能体安排今天的学习。"></textarea>
          <button class="btn" id="draw">画图理解</button>
          <button class="btn primary" id="send">发送</button>
        </div>
      </section>

      <aside class="panel visual">
        <div class="head"><h2>图示板</h2></div>
        <div class="visual-board" id="visualBoard"></div>
        <div class="body small">图示会根据题目自动切换。第一版支持分数、数轴、函数、几何和面积模型。</div>
      </aside>
    </main>
  </div>

  <script>
    let stage = "小学";
    let history = [];
    let authToken = localStorage.getItem("math_agent_token") || "";
    let currentUser = null;
    const messages = document.querySelector("#messages");
    const quota = document.querySelector("#quota");
    const authPanel = document.querySelector("#authPanel");
    const mainApp = document.querySelector("#mainApp");
    const visualBoard = document.querySelector("#visualBoard");

    function profile() {
      return {
        stage,
        goal: document.querySelector("#goal").value,
        state: document.querySelector("#state").value
      };
    }

    function addMessage(text, role = "agent") {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function visualCard(title, svg, legend) {
      visualBoard.innerHTML = `
        <div class="visual-card">
          <div class="visual-title">${title}</div>
          ${svg}
          <div class="legend">${legend}</div>
        </div>
      `;
    }

    function drawFraction() {
      visualCard(
        "分数除法：看见“里面有几个”",
        `<svg viewBox="0 0 320 180" role="img" aria-label="分数除法图示">
          <rect x="24" y="32" width="240" height="34" fill="#fff" stroke="#98a2b3"/>
          <rect x="24" y="32" width="180" height="34" fill="#99f6e4" stroke="#0f766e"/>
          <line x1="84" y1="32" x2="84" y2="66" stroke="#98a2b3"/>
          <line x1="144" y1="32" x2="144" y2="66" stroke="#98a2b3"/>
          <line x1="204" y1="32" x2="204" y2="66" stroke="#98a2b3"/>
          <text x="24" y="25" font-size="13" fill="#344054">把 1 平均分成 4 份</text>
          <text x="92" y="55" font-size="13" fill="#064e3b">3/4</text>
          <rect x="24" y="104" width="60" height="34" fill="#ccfbf1" stroke="#0f766e"/>
          <rect x="84" y="104" width="60" height="34" fill="#ccfbf1" stroke="#0f766e"/>
          <rect x="144" y="104" width="60" height="34" fill="#ccfbf1" stroke="#0f766e"/>
          <text x="39" y="126" font-size="13" fill="#064e3b">1/4</text>
          <text x="99" y="126" font-size="13" fill="#064e3b">1/4</text>
          <text x="159" y="126" font-size="13" fill="#064e3b">1/4</text>
          <text x="24" y="162" font-size="14" fill="#1f2937">3/4 ÷ 1/4 = 3</text>
        </svg>`,
        "除以一个分数，可以先理解为：目标量里包含几个这样的单位分数。"
      );
    }

    function drawNumberLine() {
      visualCard(
        "数轴：看见大小和位置",
        `<svg viewBox="0 0 320 170" role="img" aria-label="数轴图示">
          <line x1="28" y1="90" x2="292" y2="90" stroke="#344054" stroke-width="2"/>
          <polygon points="292,90 282,84 282,96" fill="#344054"/>
          ${[0,1,2,3,4].map((n,i)=>`<line x1="${40+i*55}" y1="82" x2="${40+i*55}" y2="98" stroke="#667085"/><text x="${36+i*55}" y="120" font-size="13" fill="#344054">${n}</text>`).join("")}
          <circle cx="122.5" cy="90" r="7" fill="#0f766e"/>
          <text x="104" y="70" font-size="13" fill="#0f766e">1.5</text>
          <path d="M40 54 C65 30, 96 30, 122 54" fill="none" stroke="#7c3aed" stroke-width="2"/>
          <text x="60" y="28" font-size="13" fill="#6d28d9">从 0 走 1.5</text>
        </svg>`,
        "数轴适合比较大小、理解负数、分数、小数和方程解的位置。"
      );
    }

    function drawFunction() {
      visualCard(
        "函数：看见输入和输出怎样一起变",
        `<svg viewBox="0 0 320 220" role="img" aria-label="函数图示">
          <line x1="45" y1="180" x2="290" y2="180" stroke="#344054" stroke-width="2"/>
          <line x1="60" y1="198" x2="60" y2="24" stroke="#344054" stroke-width="2"/>
          <polygon points="290,180 280,174 280,186" fill="#344054"/>
          <polygon points="60,24 54,34 66,34" fill="#344054"/>
          <path d="M65 165 C100 135, 135 92, 170 85 C205 78, 235 110, 270 55" fill="none" stroke="#0f766e" stroke-width="3"/>
          <line x1="150" y1="180" x2="150" y2="94" stroke="#98a2b3" stroke-dasharray="4 4"/>
          <line x1="60" y1="94" x2="150" y2="94" stroke="#98a2b3" stroke-dasharray="4 4"/>
          <circle cx="150" cy="94" r="6" fill="#7c3aed"/>
          <text x="156" y="88" font-size="13" fill="#6d28d9">(x, y)</text>
          <text x="278" y="200" font-size="13" fill="#344054">x</text>
          <text x="38" y="34" font-size="13" fill="#344054">y</text>
        </svg>`,
        "函数图像不是一堆点，而是“一个量变化时，另一个量怎样跟着变”。"
      );
    }

    function drawGeometry() {
      visualCard(
        "几何证明：看见关系而不是背步骤",
        `<svg viewBox="0 0 320 220" role="img" aria-label="几何图示">
          <polygon points="70,170 250,170 150,48" fill="#f8fafc" stroke="#1d4ed8" stroke-width="2"/>
          <line x1="150" y1="48" x2="150" y2="170" stroke="#0f766e" stroke-width="2" stroke-dasharray="5 4"/>
          <rect x="150" y="158" width="12" height="12" fill="none" stroke="#0f766e"/>
          <text x="58" y="188" font-size="14" fill="#344054">A</text>
          <text x="254" y="188" font-size="14" fill="#344054">B</text>
          <text x="145" y="40" font-size="14" fill="#344054">C</text>
          <text x="156" y="154" font-size="13" fill="#0f766e">高</text>
          <path d="M86 163 L96 153" stroke="#7c3aed" stroke-width="2"/>
          <path d="M230 153 L240 163" stroke="#7c3aed" stroke-width="2"/>
          <text x="92" y="112" font-size="13" fill="#1f2937">找相等</text>
          <text x="190" y="112" font-size="13" fill="#1f2937">找垂直</text>
        </svg>`,
        "几何题先看图中的稳定关系：相等、平行、垂直、角度、辅助线。"
      );
    }

    function drawAreaModel() {
      visualCard(
        "面积模型：看见乘法和分配",
        `<svg viewBox="0 0 320 210" role="img" aria-label="面积模型">
          <rect x="58" y="42" width="210" height="120" fill="#fff" stroke="#344054" stroke-width="2"/>
          <line x1="128" y1="42" x2="128" y2="162" stroke="#98a2b3"/>
          <line x1="198" y1="42" x2="198" y2="162" stroke="#98a2b3"/>
          <line x1="58" y1="102" x2="268" y2="102" stroke="#98a2b3"/>
          <rect x="58" y="42" width="140" height="60" fill="#ccfbf1" opacity=".9"/>
          <rect x="198" y="102" width="70" height="60" fill="#ddd6fe" opacity=".9"/>
          <text x="110" y="76" font-size="14" fill="#064e3b">部分面积</text>
          <text x="206" y="136" font-size="14" fill="#5b21b6">部分面积</text>
          <text x="136" y="190" font-size="14" fill="#1f2937">总面积 = 各部分相加</text>
        </svg>`,
        "面积模型适合理解乘法、分配律、分数乘法和代数展开。"
      );
    }

    function drawDefault() {
      visualCard(
        "学习结构：从卡点到稳定方法",
        `<svg viewBox="0 0 320 180" role="img" aria-label="学习结构图">
          <rect x="24" y="62" width="74" height="44" rx="8" fill="#fff" stroke="#98a2b3"/>
          <rect x="123" y="62" width="74" height="44" rx="8" fill="#eef8f6" stroke="#0f766e"/>
          <rect x="222" y="62" width="74" height="44" rx="8" fill="#fff" stroke="#98a2b3"/>
          <text x="43" y="89" font-size="13" fill="#344054">卡点</text>
          <text x="142" y="89" font-size="13" fill="#0f766e">提示</text>
          <text x="235" y="89" font-size="13" fill="#344054">方法</text>
          <line x1="98" y1="84" x2="123" y2="84" stroke="#667085"/>
          <polygon points="123,84 115,79 115,89" fill="#667085"/>
          <line x1="197" y1="84" x2="222" y2="84" stroke="#667085"/>
          <polygon points="222,84 214,79 214,89" fill="#667085"/>
          <text x="50" y="140" font-size="13" fill="#667085">先看卡在哪里，再推进一小步</text>
        </svg>`,
        "可以输入具体题目，我会切换成更贴合的图。"
      );
    }

    function renderVisual(text) {
      const value = `${text || ""}`.toLowerCase();
      if (/分数|几分之|除法|÷|\/|约分|通分/.test(value)) return drawFraction();
      if (/函数|坐标|图像|一次|二次|y=|x=/.test(value)) return drawFunction();
      if (/几何|三角|角|平行|垂直|证明|圆|相似|全等/.test(value)) return drawGeometry();
      if (/面积|长方形|正方形|乘法|分配律|展开/.test(value)) return drawAreaModel();
      if (/数轴|负数|小数|大小|比较/.test(value)) return drawNumberLine();
      return drawDefault();
    }

    function setQuota(data) {
      if (!data || typeof data.remaining === "undefined") return;
      quota.textContent = `今日剩余：${data.remaining}/${data.limit} 次`;
    }

    function authHeaders() {
      return authToken ? { Authorization: `Bearer ${authToken}` } : {};
    }

    function updateAuthView(data) {
      currentUser = data?.user || null;
      setQuota(data);
      document.querySelector("#logout").classList.toggle("hidden", !currentUser);
      authPanel.classList.toggle("hidden", Boolean(currentUser));
      mainApp.classList.toggle("hidden", !currentUser);
      if (currentUser && !messages.children.length) {
        addMessage(`你好，${currentUser.name}。你可以发一道题，也可以让我安排今天的学习。我会先定位卡点，再给合适提示，帮助学生形成稳定方法。`);
      }
    }

    async function loadQuota() {
      try {
        const res = await fetch("/api/me", { headers: authHeaders() });
        updateAuthView(await res.json());
      } catch {
        quota.textContent = "剩余次数：无法读取";
      }
    }

    async function authRequest(path) {
      const payload = {
        name: document.querySelector("#authName").value.trim(),
        email: document.querySelector("#authEmail").value.trim(),
        password: document.querySelector("#authPassword").value
      };
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error || "操作失败");
        return;
      }
      authToken = data.token;
      localStorage.setItem("math_agent_token", authToken);
      updateAuthView(data);
    }

    async function send(text) {
      addMessage(text, "user");
      renderVisual(text);
      history.push({ role: "user", content: text });
      const loading = addMessage("正在生成个性化讲解...");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({
            profile: profile(),
            messages: history
          })
        });
        const data = await res.json();
        loading.remove();
        setQuota(data);

        if (!res.ok) {
          addMessage(data.error || "本次请求失败。", "error");
          return;
        }

        addMessage(data.answer);
        history.push({ role: "assistant", content: data.answer });
      } catch (error) {
        loading.remove();
        addMessage("网络或服务暂时不可用，请稍后再试。", "error");
      }
    }

    document.querySelectorAll("#stageButtons button").forEach(button => {
      button.addEventListener("click", () => {
        stage = button.dataset.stage;
        document.querySelectorAll("#stageButtons button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    document.querySelector("#send").addEventListener("click", () => {
      const box = document.querySelector("#question");
      const text = box.value.trim();
      if (!text) return;
      box.value = "";
      send(text);
    });

    document.querySelector("#draw").addEventListener("click", () => {
      const box = document.querySelector("#question");
      const lastUser = [...messages.querySelectorAll(".user")].pop();
      renderVisual(box.value.trim() || lastUser?.textContent || "");
    });

    document.querySelector("#plan").addEventListener("click", () => {
      send("请根据我的阶段、目标和当前状态，安排今天的数学学习。");
    });

    document.querySelector("#register").addEventListener("click", () => authRequest("/api/register"));
    document.querySelector("#login").addEventListener("click", () => authRequest("/api/login"));
    document.querySelector("#logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST", headers: authHeaders() }).catch(() => {});
      authToken = "";
      currentUser = null;
      localStorage.removeItem("math_agent_token");
      messages.innerHTML = "";
      updateAuthView({ user: null, limit: 0, remaining: 0 });
      quota.textContent = "请先登录";
    });

    loadQuota();
    drawDefault();
  </script>
</body>
</html>
